{{ define "main" }}
<section class="page-header">
  <div class="container">
    <h1>{{ .Title }}</h1>
  </div>
</section>
<section class="content-section">
  <div class="container contact-page">
    <div class="contact-intro">{{ .Content }}</div>

    <form id="contact-form" class="contact-form" novalidate>
      {{/* Honeypot — hidden from users, filled in by bots */}}
      <div aria-hidden="true" class="contact-honeypot">
        <label for="website">Leave this blank</label>
        <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
      </div>

      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required autocomplete="name" placeholder="Your name">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required placeholder="How can we help?"></textarea>
      </div>

      <div id="form-status" role="alert" aria-live="polite"></div>

      <button type="submit" class="btn-submit">Send Message</button>
    </form>
  </div>
</section>

<script>
(function () {
  var form = document.getElementById('contact-form');
  var status = document.getElementById('form-status');
  var btn = form.querySelector('button[type=submit]');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    status.className = '';
    status.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Sending\u2026';

    var payload = {
      website: form.website.value,
      name: form.name.value.trim(),
      email: form.email.value.trim(),
      message: form.message.value.trim()
    };

    fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
      .then(function (res) {
        return res.json().then(function (data) {
          return { ok: res.ok, data: data };
        });
      })
      .then(function (result) {
        if (result.ok) {
          form.reset();
          status.className = 'form-status success';
          status.textContent = 'Thank you \u2014 your message has been sent.';
        } else {
          status.className = 'form-status error';
          status.textContent = result.data.error || 'Something went wrong. Please try again.';
        }
      })
      .catch(function () {
        status.className = 'form-status error';
        status.textContent = 'Network error. Please check your connection and try again.';
      })
      .finally(function () {
        btn.disabled = false;
        btn.textContent = 'Send Message';
      });
  });
}());
</script>
{{ end }}
